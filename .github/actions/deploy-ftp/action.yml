name: Deploy FTP
description: Upload an existing build folder to an FTP/FTPS server.

inputs:
  local-dir:
    description: Local directory to upload.
    required: false
    default: dist
  ftp-host:
    description: FTP host.
    required: true
  ftp-port:
    description: FTP port.
    required: false
    default: "21"
  ftp-username:
    description: FTP username.
    required: true
  ftp-password:
    description: FTP password.
    required: true
  ftp-remote-dir:
    description: Remote target directory.
    required: true
  ftp-secure:
    description: Enable FTPS when true.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate FTP deployment configuration
      shell: bash
      run: |
        missing=0
        for key in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_REMOTE_DIR LOCAL_DIR; do
          if [ -z "${!key}" ]; then
            echo "::error::Missing required input: ${key}"
            missing=1
          fi
        done
        if [ "${missing}" -ne 0 ]; then
          exit 1
        fi

        if [ ! -d "${LOCAL_DIR}" ]; then
          echo "::error::Local directory '${LOCAL_DIR}' does not exist. Build step must run before deploy."
          exit 1
        fi
      env:
        LOCAL_DIR: ${{ inputs.local-dir }}
        FTP_HOST: ${{ inputs.ftp-host }}
        FTP_USERNAME: ${{ inputs.ftp-username }}
        FTP_PASSWORD: ${{ inputs.ftp-password }}
        FTP_REMOTE_DIR: ${{ inputs.ftp-remote-dir }}

    - name: Install lftp
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Upload build via FTP
      shell: bash
      run: |
        ftp_port='${{ inputs.ftp-port }}'
        ftp_secure='${{ inputs.ftp-secure }}'

        if [ "${ftp_secure}" = "true" ]; then
          ftp_ssl_allow="true"
          ftp_ssl_force="true"
        else
          ftp_ssl_allow="false"
          ftp_ssl_force="false"
        fi

        lftp <<EOF
        set cmd:fail-exit true
        set net:max-retries 2
        set net:timeout 30
        set net:persist-retries 0
        set ftp:passive-mode true
        set ftp:ssl-allow ${ftp_ssl_allow}
        set ftp:ssl-force ${ftp_ssl_force}
        open -p ${ftp_port} -u "${{ inputs.ftp-username }}","${{ inputs.ftp-password }}" "${{ inputs.ftp-host }}"
        mirror --reverse --delete --verbose "${{ inputs.local-dir }}" "${{ inputs.ftp-remote-dir }}"
        bye
        EOF