name: Deploy FTP

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA)"
        required: false
        default: "main"
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: ""
        type: string
    secrets:
      FTP_HOST:
        required: false
      FTP_PORT:
        required: false
      FTP_USERNAME:
        required: false
      FTP_PASSWORD:
        required: false
      FTP_REMOTE_DIR:
        required: false
      FTP_SECURE:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy ref
        id: resolve_ref
        shell: bash
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            echo "value=${{ inputs.ref }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_ref.outputs.value }}

      - name: Deploy dist via reusable action
        uses: ./.github/actions/deploy-ftp
        with:
          node-version-file: .nvmrc
          install-command: npm ci
          build-command: npm run build
          local-dir: dist
          ftp-host: ${{ secrets.FTP_HOST }}
          ftp-port: ${{ secrets.FTP_PORT || '21' }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          ftp-remote-dir: ${{ secrets.FTP_REMOTE_DIR }}
          ftp-secure: ${{ secrets.FTP_SECURE || 'false' }}