name: Release Notes

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag range
        id: tag_range
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v*.*.*' --sort=-v:refname | grep -Fxv "${current_tag}" | head -n 1 || true)"

          if [ -n "${previous_tag}" ]; then
            cliff_args="${previous_tag}..${current_tag} --strip header"
            echo "Using range: ${previous_tag}..${current_tag}"
          else
            # First release tag in this repo: use explicit tag mode instead of commit range.
            cliff_args="--tag ${current_tag} --strip header"
            echo "No previous tag found. Using tag mode for ${current_tag}."
          fi

          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"
          {
            echo "cliff_args<<EOF"
            echo "${cliff_args}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release notes with git-cliff
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: "${{ steps.tag_range.outputs.cliff_args }}"
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          make_latest: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Notify Discord about release notes
        if: ${{ env.DISCORD_RELEASE_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          notes=""

          if [ -f RELEASE_NOTES.md ]; then
            notes="$(cat RELEASE_NOTES.md)"
          fi

          if [ -z "${notes}" ]; then
            notes="No release notes were generated for this release."
          fi

          max_length=3800
          if [ ${#notes} -gt ${max_length} ]; then
            notes="${notes:0:${max_length}}\n\n[... truncated, read full notes in GitHub release.]"
          fi

          payload="$(jq -n \
            --arg username "Unit Golf Releases" \
            --arg title "Unit Golf ${GITHUB_REF_NAME}" \
            --arg url "${release_url}" \
            --arg description "${notes}" \
            '{
              username: $username,
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $description,
                  color: 3447003
                }
              ]
            }')"

          curl --fail-with-body \
            --header "Content-Type: application/json" \
            --request POST \
            --data "${payload}" \
            "${DISCORD_RELEASE_WEBHOOK_URL}"

      - name: Warn if Discord webhook is missing
        if: ${{ env.DISCORD_RELEASE_WEBHOOK_URL == '' }}
        run: echo "::warning::DISCORD_RELEASE_WEBHOOK_URL is not configured. Skipping Discord release notification."

  deploy_ftp:
    needs: release
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
      FTP_SECURE: ${{ secrets.FTP_SECURE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Validate FTP deployment configuration
        shell: bash
        run: |
          missing=0
          for key in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required repository secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload dist via FTP
        shell: bash
        run: |
          ftp_port="${FTP_PORT:-21}"
          ftp_secure="${FTP_SECURE:-false}"

          if [ "${ftp_secure}" = "true" ]; then
            ftp_ssl_allow="true"
            ftp_ssl_force="true"
          else
            ftp_ssl_allow="false"
            ftp_ssl_force="false"
          fi

          lftp <<EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 30
          set net:persist-retries 0
          set ftp:passive-mode true
          set ftp:ssl-allow ${ftp_ssl_allow}
          set ftp:ssl-force ${ftp_ssl_force}
          open -p ${ftp_port} -u "${FTP_USERNAME}","${FTP_PASSWORD}" "${FTP_HOST}"
          mirror --reverse --delete --verbose "dist" "${FTP_REMOTE_DIR}"
          bye
          EOF