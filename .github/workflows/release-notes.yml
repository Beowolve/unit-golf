name: Release Notes

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        uses: ./.github/actions/generate-release-notes
        with:
          config: cliff.toml
          output-file: RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          make_latest: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Notify Discord about release notes
        uses: ./.github/actions/notify-discord-release
        with:
          webhook-url: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          tag-name: ${{ github.ref_name }}
          release-url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          notes-path: RELEASE_NOTES.md
          username: Unit Golf Releases
          title-prefix: Unit Golf

  deploy_ftp:
    needs: release
    uses: ./.github/workflows/deploy-ftp.yml
    with:
      ref: ${{ github.ref_name }}
    secrets: inherit