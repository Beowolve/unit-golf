name: Release Notes

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA)"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        uses: ./.github/actions/generate-release-notes
        with:
          config: cliff.toml
          output-file: RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          make_latest: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Notify Discord about release notes
        uses: ./.github/actions/notify-discord-release
        with:
          webhook-url: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          tag-name: ${{ github.ref_name }}
          release-url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          notes-path: RELEASE_NOTES.md
          username: Unit Golf Releases
          title-prefix: Unit Golf

  deploy_ftp:
    needs: release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

      - name: Deploy dist via reusable action
        uses: ./.github/actions/deploy-ftp
        with:
          node-version-file: .nvmrc
          install-command: npm ci
          build-command: npm run build
          local-dir: dist
          ftp-host: ${{ secrets.FTP_HOST }}
          ftp-port: ${{ secrets.FTP_PORT || '21' }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          ftp-remote-dir: ${{ secrets.FTP_REMOTE_DIR }}
          ftp-secure: ${{ secrets.FTP_SECURE || 'false' }}