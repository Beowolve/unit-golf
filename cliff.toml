[changelog]
header = """
# Changelog
"""
body = """
{% if version %}
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {{ commit.message | upper_first }}{% if commit.scope %} ({{ commit.scope }}){% endif %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v?[0-9]+\\.[0-9]+\\.[0-9]+.*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

commit_parsers = [
  # Ignore maintenance and internal-only changes for release notes.
  { message = "^docs", skip = true },
  { message = "^test", skip = true },
  { message = "^refactor", skip = true },
  { message = "^(build|ci|chore)", skip = true },
  { message = "^(feat|fix|perf)\\((ci|workflow|release|deps|build)\\)", skip = true },
  { message = "(bump|version|release notes|github actions|workflow)", skip = true },
  { message = "^initialize", skip = true },

  # Keep release notes focused on end-user value.
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { body = ".*security", group = "Security" }
]